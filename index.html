<!DOCTYPE html>
<html lang="en">
	<head>
		<title>VR panorama with depth — terminal interior</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style>
			body { margin: 0; background: #101010; color: #fff; font-family: sans-serif; overflow: hidden; }
			#info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 1; font-size: 13px; }
			#info a { color: #8cf; }
		</style>
	</head>
	<body>
		<div id="container"></div>
		<div id="info">VR panorama with depth — drag to look, or click "Enter VR"</div>

		<!-- three.js from CDN so this runs from one folder with no local build -->
		<script type="importmap">
		{
			"imports": {
				"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
				"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
			}
		}
		</script>

		<script type="module">

			import * as THREE from 'three';
			import { VRButton } from 'three/addons/webxr/VRButton.js';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			let camera, scene, renderer, sphere, controls, clock;

			init();

			function init() {

				const container = document.getElementById( 'container' );

				clock = new THREE.Clock();

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0x101010 );

				const light = new THREE.AmbientLight( 0xffffff, 3 );
				scene.add( light );

				camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.1, 2000 );
				// put the camera at the centre of the sphere
				camera.position.set( 0, 0, 0.01 );
				scene.add( camera );

				// Sphere we view from the inside. Higher segment count = smoother displacement.
				const panoSphereGeo = new THREE.SphereGeometry( 6, 512, 512 );

				const panoSphereMat = new THREE.MeshStandardMaterial( {
					side: THREE.BackSide,
					// POSITIVE scale: our depth map is inverted so NEAR = bright = pushed toward viewer.
					// Tune this value to taste (try 0.5 – 2.0). Too high exaggerates noise in the holes.
					displacementScale: 1.2,
					displacementBias: 0.0
				} );

				sphere = new THREE.Mesh( panoSphereGeo, panoSphereMat );

				const manager = new THREE.LoadingManager();
				const loader = new THREE.TextureLoader( manager );

				// --- your colour panorama (left eye, 2:1 equirectangular) ---
				loader.load( './pano_color.jpg', function ( texture ) {
					texture.colorSpace = THREE.SRGBColorSpace;
					texture.minFilter = THREE.LinearFilter;
					texture.generateMipmaps = false;
					sphere.material.map = texture;
					sphere.material.needsUpdate = true;
				} );

				// --- your depth map (inverted: near = bright) ---
				loader.load( './pano_depth.jpg', function ( depth ) {
					depth.minFilter = THREE.LinearFilter;
					depth.generateMipmaps = false;
					sphere.material.displacementMap = depth;
					sphere.material.needsUpdate = true;
				} );

				manager.onLoad = function () {
					scene.add( sphere );
				};

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				renderer.xr.enabled = true;
				renderer.xr.setReferenceSpaceType( 'local' );
				container.appendChild( renderer.domElement );

				document.body.appendChild( VRButton.createButton( renderer ) );

				// Mouse/touch look-around for desktop preview (disabled automatically in VR)
				controls = new OrbitControls( camera, renderer.domElement );
				controls.enableZoom = false;
				controls.enablePan = false;
				controls.rotateSpeed = -0.3; // invert so dragging feels like looking around from inside

				window.addEventListener( 'resize', onWindowResize );

			}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			function animate() {
				if ( renderer.xr.isPresenting === false && controls ) {
					controls.update();
				}
				renderer.render( scene, camera );
			}

		</script>
	</body>
</html>
